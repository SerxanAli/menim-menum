<!DOCTYPE html>
<html lang="az">
<head>

<style>
body {

  background: #f5f5f5;
  margin: 0;

}

  text-align: center;
  background: #333;
  color: white;
  padding: 15px;
}

.menu {
  padding: 20px;
}

  margin-bottom: 15px;

  height: 80px;
  border-radius: 10px;
  margin-right: 10px;
}

.info {
  flex: 1;
}

.name {
  font-size: 18px;
  font-weight: bold;
}

.price {
  color: green;
}
</style>

<body>

      <div class="price">5 AZN</div>
    </div>
  </div>

  <div class="item">
    <img src="https://i.imgur.com/8zQZ7ZT.png">
    <div class="info">
      <div class="name">Pizza</div>
      <div class="price">8 AZN</div>
    </div>
  </div>

  <div class="item">
